name: Dependabot — build & auto-merge

# Sur chaque PR Dependabot : on build (garde-fou : pas de merge si ça casse), on
# merge, puis on déclenche le déploiement sur main. On ne déploie PAS depuis la PR
# (l'environnement github-pages restreint les déploiements à main) ; on utilise
# workflow_dispatch, seul événement que le GITHUB_TOKEN est autorisé à déclencher
# malgré l'anti-boucle GitHub.

on: pull_request

permissions:
  contents: write
  pull-requests: write
  actions: write # pour déclencher deploy.yml après le merge

jobs:
  build-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Métadonnées Dependabot
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Build (valide la mise à jour)
        run: npm run build

      # Auto-merge — sauf montée de version MAJEURE, gardée pour revue manuelle.
      - name: Merge + redéploiement
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: |
          gh pr merge --squash --delete-branch "$PR_URL"
          gh workflow run deploy.yml --ref main
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
