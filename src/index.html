<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Icônes DSFR — recherche & copie d'identifiant</title>
    <meta
      name="description"
      content="Explorateur visuel des icônes du Système de Design de l'État (DSFR) : rechercher, filtrer par catégorie, et copier l'identifiant fr-icon-* en un clic."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="skip-link" href="#grid">Aller à la grille d'icônes</a>

    <header class="site-header">
      <div class="header-row">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">◆</span>
          <div>
            <h1>Icônes DSFR</h1>
            <p class="subtitle">
              Cherchez une icône, copiez son identifiant
              <code>fr-icon-*</code>.
            </p>
          </div>
        </div>
        <div class="header-actions">
          <span class="meta" id="meta-info" aria-live="polite"></span>
          <button
            type="button"
            id="theme-toggle"
            class="icon-btn"
            aria-label="Basculer le thème clair/sombre"
            title="Thème clair/sombre"
          ></button>
        </div>
      </div>

      <div class="search-row">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M11 2a9 9 0 0 1 7.032 14.617l4.675 4.676-1.414 1.414-4.676-4.675A9 9 0 1 1 11 2Zm0 2a7 7 0 1 0 0 14 7 7 0 0 0 0-14Z"
            />
          </svg>
          <input
            type="search"
            id="search"
            placeholder="Rechercher (nom, mot-clé)…  appuyez sur /"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="Rechercher une icône"
          />
          <button
            type="button"
            id="clear-search"
            class="clear-btn"
            aria-label="Effacer la recherche"
            hidden
          >
            ×
          </button>
        </div>
      </div>

      <div class="filters">
        <div
          class="chip-group"
          id="category-filters"
          role="group"
          aria-label="Filtrer par catégorie"
        ></div>
        <div class="filters-secondary">
          <div
            class="segmented"
            id="variant-filter"
            role="group"
            aria-label="Filtrer par style"
          >
            <button type="button" data-variant="all" class="active">Tous styles</button>
            <button type="button" data-variant="line">Ligne</button>
            <button type="button" data-variant="fill">Plein</button>
          </div>
          <label class="copy-format">
            <span>Copier en :</span>
            <select id="copy-format" aria-label="Format de copie">
              <option value="class">Classe fr-icon-*</option>
              <option value="name">Nom de l'icône</option>
              <option value="html">HTML &lt;span&gt;</option>
              <option value="svg">SVG inline</option>
            </select>
          </label>
        </div>
      </div>
    </header>

    <main>
      <div id="grid" class="grid" aria-label="Grille d'icônes"></div>
      <p id="empty" class="empty" hidden>
        Aucune icône ne correspond à votre recherche.
      </p>
    </main>

    <footer class="site-footer">
      <p>
        Données : <code id="dsfr-version">@gouvfr/dsfr</code> ·
        <a
          href="https://www.systeme-de-design.gouv.fr/version-courante/fr/fondamentaux/icone"
          target="_blank"
          rel="noopener"
          >Documentation officielle des icônes</a
        >
      </p>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <noscript>
      <p style="padding: 2rem; text-align: center">
        Ce site nécessite JavaScript pour afficher et filtrer les icônes.
      </p>
    </noscript>

    <script src="./icons-data.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
